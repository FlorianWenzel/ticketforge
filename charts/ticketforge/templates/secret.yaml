{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ticketforge.fullname" . }}
  labels:
    {{- include "ticketforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_TOKEN: {{ required "secret.githubToken is required when not using existingSecret" .Values.secret.githubToken | quote }}
  GITHUB_BOT_USERNAME: {{ required "secret.githubBotUsername is required when not using existingSecret" .Values.secret.githubBotUsername | quote }}
  {{- if .Values.secret.opencodeApiKey }}
  OPENCODE_API_KEY: {{ .Values.secret.opencodeApiKey | quote }}
  {{- end }}
{{- end }}
