image:
  repository: ghcr.io/florianwenzel/ticketforge
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Secrets — pick ONE option:
#
# Option A: Let the chart create the secret (set secret.* values)
# Option B: Provide your own secret (set existingSecret to its name)
#           The secret must contain keys: GITHUB_TOKEN, GITHUB_BOT_USERNAME
#           and optionally: OPENCODE_API_KEY
existingSecret: ""

secret:
  githubToken: ""
  githubBotUsername: ""
  opencodeApiKey: ""

# GitHub
githubRepoAllowlist: ""
githubRepository: ""

# OpenCode
opencodeModel: "anthropic/claude-sonnet-4-6"

# Polling intervals
pollCronAssignments: "*/2 * * * *"
pollCronMentions: "*/2 * * * *"
pollCronCi: "*/3 * * * *"
pollCronStale: "*/20 * * * *"

# Worker
maxConcurrentWorkers: 1
maxRetryAttempts: 3
staleThresholdMinutes: 60

# Persistence (SQLite)
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# API
apiPort: 3000
apiHost: "0.0.0.0"

# Logging
logLevel: info
logPretty: "false"

# Service
service:
  type: ClusterIP
  port: 3000

# Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ticketforge.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
